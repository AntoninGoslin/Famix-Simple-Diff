name: CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        smalltalk: [ Pharo64-13 ]
    name: ${{ matrix.smalltalk }}

    steps:
      - uses: actions/checkout@v4
        
      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ matrix.smalltalk }}
          
      - run: smalltalkci -s ${{ matrix.smalltalk }}